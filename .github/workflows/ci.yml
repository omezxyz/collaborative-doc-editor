name: CI Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22' 
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm install 
        env:
          # Prisma runs 'postinstall' here and strictly requires this variable
          # A dummy string works fine because it just needs to map your schema types
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          
      - name: Build Next.js App
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}